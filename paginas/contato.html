<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Tech Facil</title>
    <link rel="short icon" href="../midias/logo.png">
    <link rel="stylesheet" type="text/css" href="../estilos/layout.css">
    <link rel="stylesheet" href="../estilos/formulario.css">

</head>

<body>
    <header>
        <figure>
            <img class="logo" src="../midias/logo.png" alt="Logo do Blog Tech Fácil">
        </figure>
        <h1>Blog Tech Facil</h1>
    </header>
    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contatos</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Contato</h2>

            <form id="formContato">
                <fieldset>
                    <legend>Fale Conosco</legend>
                    <label for="lbNome">Nome:</label>
                    <input type="text" id="ibNome" required>

                    <label for="lbEmail">Email:</label>
                    <input type="email" id="ibEmail" required>

                    <label for="lbTelefone">Telefone:</label>
                    <input type="tel" id="ibTelefone" required>

                    <label for="lbNascimento">Data de Nascimento:</label>
                    <input type="date" id="ibNascimento" required>

                    <label for="lbOrigem">Onde nos conheceu?</label>
                    <select id="ibOrigem" required>
                        <option value="" selected disabled>Selecione...</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Google">Google</option>
                        <option value="Indicação">Indicação</option>
                        <option value="Outro">Outro</option>
                    </select>

                    <label for="lbMensagem">Mensagem:</label>
                    <textarea id="ibMensagem" rows="5" required></textarea>

                    <label for="lbNovidades">
                        <input type="checkbox" id="ibNovidades">
                        Desejo receber novidades
                    </label>

                    <button type="button" onclick="exibirDados()">
                        Exibir Dados
                    </button>
                </fieldset>
            </form>
        </section>

        <section id="confirmacao">
            <h2>Confirmação dos Dados</h2>

            <p><strong>Nome:</strong> <span id="cNome"></span></p>

            <p><strong>Email:</strong> <span id="cEmail"></span></p>

            <p><strong>Telefone:</strong> <span id="cTelefone"></span></p>

            <p><strong>Data de Nascimento:</strong> <span id="cNascimento"></span></p>

            <p><strong>Onde nos conheceu:</strong> <span id="cOrigem"></span></p>

            <p><strong>Mensagem:</strong> <span id="cMensagem"></span></p>

            <button type="submit" form="formContato">
                Confirmar
            </button>
        </section>
        
    </main>

    <footer>
        <p>&copy; 2026 Tech Fácil. Todos os direitos reservados.</p>
        <p>Siga-nos nas redes sociais</p>
    </footer>

    <script src="../script/envioForm.js"></script>
</body>

</html>
